<!DOCTYPE html>
<html>
<head><title>Clipper — Authorization Complete</title>
<style>body{font-family:sans-serif;background:#0a0a1a;color:#e0e0e0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{text-align:center;padding:2rem}h1{color:#00d4ff;font-size:2rem}p{color:#999;margin:1rem 0}code{background:#1a1a3a;padding:4px 10px;border-radius:4px;color:#4ecdc4}</style>
</head>
<body><div class="box">
<h1>✅ Authorized!</h1>
<p>You can close this window and return to Clipper.</p>
<p><code id="code"></code></p>
<script>const p=new URLSearchParams(window.location.search);const c=p.get('code');if(c)document.getElementById('code').textContent='Auth code received';</script>
</div></body></html>
